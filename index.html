<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>FuelMap ID</title>

  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<script src="https://maps.googleapis.com/maps/api/js?key=API_KEY&libraries=places&callback=initMap" async defer></script>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <i class="fa-solid fa-gas-pump"></i>
    <div>
      <h1>FuelMap ID</h1>
      <p>Penghitung Konsumsi Bahan Bakar</p>
    </div>
  </div>

  <!-- FORM -->
  <div class="card">

    <!-- TITIK AWAL -->
    <div class="section">
      <h3><i class="fa-solid fa-location-dot"></i> Titik Awal</h3>
      <span class="sub">Cari Lokasi</span>

      <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchAwal" type="text" placeholder="Ketik lokasi anda...">
        <span onclick="openMap('awal')">Pilih Peta</span>
      </div>

      <div class="grid">
        <div>
          <label>Latitude</label>
          <input id="latAwal" type="text" placeholder="Masukkan latitude">
        </div>
        <div>
          <label>Longitude</label>
          <input id="longAwal" type="text" placeholder="Masukkan longtitude">
        </div>
      </div>
    </div>

    <!-- TITIK TUJUAN -->
    <div class="section">
      <h3><i class="fa-solid fa-location-dot"></i> Titik Tujuan</h3>
      <span class="sub">Cari Lokasi</span>

      <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchTujuan" type="text" placeholder="Ketik lokasi anda...">
        <span onclick="openMap('tujuan')">Pilih Peta</span>
      </div>

      <div class="grid">
        <div>
          <label>Latitude</label>
          <input id="latTujuan" type="text" placeholder="Masukkan latitude">
        </div>
        <div>
          <label>Longitude</label>
          <input id="longTujuan" type="text" placeholder="Masukkan longtitude">
        </div>
      </div>
    </div>

    <!-- PILIHAN -->
    <div class="row">

      <div class="left">
        <span class="sub">Pilih Kendaraan</span>

        <div class="vehicle">
          <button class="active" onclick="pilihKendaraan(40, this)">
            <i class="fa-solid fa-motorcycle"></i>
            <small>Motor</small>
          </button>

          <button onclick="pilihKendaraan(12, this)">
            <i class="fa-solid fa-car"></i>
            <small>Mobil</small>
          </button>

          <button onclick="pilihKendaraan(5, this)">
            <i class="fa-solid fa-truck"></i>
            <small>Ken.Besar</small>
          </button>
        </div>
      </div>

      <div class="right">
        <span class="sub">Pilih Jenis BBM</span>

        <select id="bbm">
          <option value="10000">Pertalite</option>
          <option value="13000">Pertamax</option>
          <option value="13500">Pertamax Green</option>
          <option value="15000">Pertamax Turbo</option>
          <option value="6800">Solar</option>
          <option value="7200">Dexlite</option>
        </select>

        <div id="hargaBBM" class="harga">Rp 10.000/Ltr</div>
      </div>

    </div>

    <button class="btn" onclick="hitungBBM()">Hitung Jarak & Biaya BBM</button>

  </div>

  <!-- HASIL -->
  <div class="card hasil">

    <h3>Hasil Perhitungan</h3>

    <div class="grid">
      <div class="box">
        <p>Jarak Tempuh</p>
        <h2 id="jarak">0 Km</h2>
      </div>

      <div class="box">
        <p>BBM Dibutuhkan</p>
        <h2 id="bbmHasil">0 Liter</h2>
      </div>
    </div>

    <div class="total">
      <p>Total Biaya</p>
      <h2 id="biaya">Rp 0</h2>
    </div>

  </div>

  <div id="mapModal" class="modal">
  <div class="modal-content">
    <div id="map"></div>
    <button onclick="closeMap()">Tutup</button>
  </div>
</div>
</div>

<script src="/assets/js/script.js"></script>

</body>
</html>
